<style>
  /* Mute the "(hieu Scholl)" portion of the masthead title.
     Markup is injected via `masthead_title` in _config.yml. */
  .site-title__muted {
    opacity: 0.45;
  }

  /* Heads-up shown above the giscus widget so visitors know what's
     about to load and that posting requires a GitHub account.
     Injected by the local _includes/comments.html override. */
  .comments-notice {
    margin-top: -0.5em;
    margin-bottom: 1em;
    font-size: 0.85em;
    font-style: italic;
    opacity: 0.7;
  }

  /* Cap blog width at the banner image width (1584px). Beyond that, the
     html background shows in the side margins. body is also the
     positioning context for the absolute-positioned masthead overlay so
     it stays inside the content column. */
  html {
    background-color: #f9efe0;
  }
  body {
    position: relative;
    max-width: 1584px;
    margin-inline: auto;
  }

  /* The theme's `<nav class="skip-links">` doesn't match its SCSS
     selector `.skip-link` (singular vs plural), so no positioning styles
     apply and the default <ul>/<li> line-boxes consume flow space,
     pushing the banner down while the absolute masthead stays at top:0.
     Take the wrapper out of flow entirely. The inner <a> elements use
     .screen-reader-shortcut which has its own :focus styles to become
     visible when focused, so accessibility is preserved. */
  .skip-links {
    position: absolute;
    width: 1px;
    height: 1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
  }

  /* Pages opt in via `classes: [page-with-banner]` in front matter.
     The masthead is lifted out of flow and floated over the page__hero
     banner image so the title and nav appear as part of the banner.
     The aspect-ratio matches blog_header.png (1584x340) so the masthead
     box sits exactly over the banner; flex-end pins title/nav to the
     bottom edge of the banner, where the illustrated floor strip sits. */
  body.page-with-banner .masthead {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    aspect-ratio: 1584 / 340;
    display: flex;
    align-items: flex-end;
    background-color: transparent;
    border-bottom: none;
    pointer-events: none;
  }
  body.page-with-banner .masthead__inner-wrap {
    width: 100%;
    pointer-events: auto;
    transform: translateY(20px);
  }
  body.page-with-banner .greedy-nav,
  body.page-with-banner .greedy-nav .hidden-links {
    background: transparent;
  }
  /* Theme default is 2em; that gap reads as dead air between the banner
     and the post list. Tighten it on banner pages. */
  body.page-with-banner .page__hero {
    margin-bottom: 0.5em;
  }
</style>
