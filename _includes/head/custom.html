<style>
  /* Mute the "(hieu Scholl)" portion of the masthead title.
     Markup is injected via `masthead_title` in _config.yml. */
  .site-title__muted {
    opacity: 0.45;
  }

  /* Heads-up shown above the giscus widget so visitors know what's
     about to load and that posting requires a GitHub account.
     Injected by the local _includes/comments.html override. */
  .comments-notice {
    margin-top: -0.5em;
    margin-bottom: 1em;
    font-size: 0.85em;
    font-style: italic;
    opacity: 0.7;
  }

  /* Cap blog width at the banner image width (1584px). Beyond that, the
     html background shows in the side margins. body is also the
     positioning context for the absolutely-positioned banner image on
     banner pages, which is pulled out of flow so the masthead can sit
     directly below it. */
  html {
    background-color: #f9efe0;
  }
  body {
    position: relative;
    max-width: 1584px;
    margin-inline: auto;
  }

  /* The theme's `<nav class="skip-links">` doesn't match its SCSS
     selector `.skip-link` (singular vs plural), so no positioning styles
     apply and the default <ul>/<li> line-boxes consume flow space.
     Take the wrapper out of flow entirely. The inner <a> elements use
     .screen-reader-shortcut which has its own :focus styles to become
     visible when focused, so accessibility is preserved. */
  .skip-links {
    position: absolute;
    width: 1px;
    height: 1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
  }

  /* Pages opt in via `classes: [page-with-banner]` in front matter.
     The banner image is lifted out of flow at the top of the body so
     the masthead can sit directly below it as a separate band, sharing
     the colour of the banner image's floor strip. The two together read
     as a single illustrated header. */
  body.page-with-banner .page__hero {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    aspect-ratio: 1584 / 293;
  }
  /* The hero image is inline by default, leaving a baseline gap below
     it that shows the html bg as a thin line between banner and
     masthead. Make it a block. */
  body.page-with-banner .page__hero-image {
    display: block;
  }
  body.page-with-banner .masthead {
    /* Percent vertical margins resolve against the containing block's
       width, so this equals body_width * 293/1584 — exactly the banner
       image's height at every viewport. */
    margin-top: calc(100% * 293 / 1584);
    background-color: #c9b698;
    border-bottom: none;
  }
  /* Theme gives the masthead ~64px of height via 1em vertical padding
     on the inner-wrap and a 4em min-height on .greedy-nav. Trim both
     so the band reads as a slim continuation of the floor strip. */
  body.page-with-banner .masthead__inner-wrap {
    padding-top: 0;
    padding-bottom: 0;
  }
  body.page-with-banner .greedy-nav {
    min-height: 0;
  }
  body.page-with-banner .greedy-nav,
  body.page-with-banner .greedy-nav .hidden-links {
    background: transparent;
  }
</style>
